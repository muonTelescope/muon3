# Muon3 nRF9151 config - modern Zephyr/NCS
CONFIG_PRINTK=y
CONFIG_LOG=y
CONFIG_LOG_DEFAULT_LEVEL=3

# Modem
CONFIG_NRF_MODEM_LIB=y
CONFIG_LTE_LINK_CONTROL=y
CONFIG_LTE_AUTO_INIT_AND_CONNECT=n

# Networking for telemetry
CONFIG_NETWORKING=y
CONFIG_NET_SOCKETS=y
CONFIG_NET_SOCKETS_POSIX_NAMES=y

# SPI to gateware
CONFIG_SPI=y
CONFIG_SPI_NRFX=y

# I2C for sensors (BME280)
CONFIG_I2C=y
CONFIG_SENSOR=y

# For nRF91 specific
CONFIG_BOARD_ENABLE_CPUNET=n  # if no net core
